services:
  - type: web
    name: synaesthesia
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      # Set values in the Render Dashboard (Secrets) — required for Spotify recommendations:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      # Only if the UI is hosted on a different origin than this API (rare); otherwise omit:
      # - key: SYN_API_BASE
      #   value: https://your-api-host.example.com
